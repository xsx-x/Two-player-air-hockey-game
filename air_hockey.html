<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוקי שולחן - רשת</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a252c;
            font-family: 'Heebo', sans-serif;
            color: white;
            touch-action: none;
        }

        /* אנימציות */
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* כפתורי ניווט עליונים */
        .nav-buttons {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 200;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            margin-top: 40px;
        }

        .score-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .score-val { font-size: 48px; font-weight: 900; margin: 0 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .p1-color { color: #00d2ff; } 
        .p2-color { color: #ff3366; }
        .player-label { font-size: 18px; font-weight: bold; }

        #goal-message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px #f1c40f, 0 0 40px #f1c40f, 0 0 80px #e67e22, 5px 5px 0px #000;
            opacity: 0;
            pointer-events: none;
        }
        .show-goal { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* מסכי תפריט זכוכית */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 30, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .network-panel {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .network-panel input {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            margin: 5px;
            text-align: center;
            width: 70%;
            font-family: inherit;
            outline: none;
        }
        .network-panel input:focus { border-color: #f1c40f; }

        .btn {
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            color: #000;
            font-size: 22px;
            font-weight: 900;
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
            font-family: inherit;
        }
        .btn:hover { transform: scale(1.05); }

        .hidden { opacity: 0; pointer-events: none; }
        
        canvas { display: block; width: 100%; height: 100%; }

    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="nav-buttons">
        <a href="index.html" class="nav-btn">🏠 דף הבית</a>
        <button onclick="showStartScreen()" class="nav-btn">🔙 תפריט ראשי</button>
    </div>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="score-box" style="border-right: 5px solid #ff3366;">
                <div class="player-label p2-color">שחקן 2<br><small>W,A,S,D</small></div>
                <div id="score2" class="score-val p2-color">0</div>
            </div>
            
            <div class="score-box" style="border-left: 5px solid #00d2ff;">
                <div id="score1" class="score-val p1-color">0</div>
                <div class="player-label p1-color">שחקן 1<br><small>חצים</small></div>
            </div>
        </div>
        <div id="goal-message">שער!!!</div>
    </div>

    <!-- מסך פתיחה -->
    <div id="start-screen" class="overlay-screen">
        <div class="glass-panel">
            <h1 style="color: #f1c40f; margin-top:0; font-size: 56px;">הוקי שולחן פרו</h1>
            <p style="font-size: 18px; margin-bottom: 20px;">הגן על השער שלך ודחף את הכדור בכל הכוח אל שער היריב!</p>

            <button class="btn" onclick="startGame('LOCAL')">שחק מקומי (על אותו מחשב)</button>
            
            <div class="network-panel">
                <h3 style="margin-top:0; color: #fff;">משחק רשת - שחק נגד חבר מרחוק</h3>
                <p>קוד האירוח שלך: <strong id="my-peer-id" style="color: #00d2ff; letter-spacing: 1px;">מתחבר לשרת...</strong></p>
                <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                <input type="text" id="friend-id" placeholder="הדבק כאן קוד של חבר כדי להצטרף">
                <br>
                <button class="btn" style="padding: 8px 20px; font-size: 18px;" onclick="joinNetworkGame()">הצטרף לחדר</button>
                <p id="net-status" style="color: #f1c40f; font-weight: bold; margin-bottom: 0; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <!-- מסך ניצחון/סיום -->
    <div id="game-over-screen" class="overlay-screen hidden">
        <div class="glass-panel">
            <h1 id="winner-text" style="font-size: 48px; color: #f1c40f;">ניצחון!</h1>
            <button class="btn" onclick="showStartScreen()">חזור לתפריט</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // משתני משחק
        let width, height;
        let gameState = 'START'; 
        let gameMode = 'LOCAL'; // LOCAL, ONLINE_HOST, ONLINE_CLIENT
        let score1 = 0, score2 = 0;
        let lastTimestamp = 0;

        // סאונד
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'goal') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.1);
                osc.frequency.setValueAtTime(659.25, now + 0.2);
                osc.frequency.setValueAtTime(880, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        // אפקטים חזותיים
        let particles = [];
        let confetti = [];
        let ballTrail = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.03;
                this.size *= 0.95;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Confetti {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 1) * 20 - 5;
                this.color = ['#f1c40f', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'][Math.floor(Math.random() * 5)];
                this.size = Math.random() * 10 + 5;
                this.tilt = Math.random() * Math.PI;
                this.tiltAngle = (Math.random() - 0.5) * 0.2;
            }
            update() {
                this.vy += 0.5; 
                this.x += this.vx; this.y += this.vy;
                this.tilt += this.tiltAngle;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.tilt);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 0.5);
                ctx.restore();
            }
        }

        function createSparks(x, y, color) {
            for(let i=0; i<15; i++) particles.push(new Particle(x, y, color));
        }

        function createGoalExplosion() {
            for(let i=0; i<150; i++) {
                confetti.push(new Confetti(width/2 + (Math.random()-0.5)*200, height/2 + (Math.random()-0.5)*200));
            }
        }

        // אובייקטים ומידות
        const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 18, mass: 1, colorBase: '#ffffff', colorLight: '#e0e0e0', bounce: 0.9 };
        const p1 = { x: 0, y: 0, vx: 0, vy: 0, radius: 35, mass: 6, colorBase: '#005c8a', colorLight: '#00d2ff', speed: 1.8, maxSpeed: 15 };
        const p2 = { x: 0, y: 0, vx: 0, vy: 0, radius: 35, mass: 6, colorBase: '#8a002b', colorLight: '#ff3366', speed: 1.8, maxSpeed: 15 };

        let localKeys = {};
        let networkKeys = { up: false, down: false, left: false, right: false };

        // --- ניהול רשת באמצעות PeerJS ---
        let peer = null;
        let conn = null;

        function initPeer() {
            peer = new Peer();
            peer.on('open', id => { 
                document.getElementById('my-peer-id').innerText = id; 
            });
            peer.on('connection', c => {
                conn = c; 
                setupConnection();
                gameMode = 'ONLINE_HOST';
                document.getElementById('net-status').innerText = "שחקן התחבר! המשחק מתחיל...";
                setTimeout(() => startGame('ONLINE_HOST'), 1000);
            });
        }

        function joinNetworkGame() {
            const friendId = document.getElementById('friend-id').value.trim();
            if (!friendId) return;
            document.getElementById('net-status').innerText = "מתחבר...";
            conn = peer.connect(friendId);
            conn.on('open', () => {
                setupConnection();
                gameMode = 'ONLINE_CLIENT';
                document.getElementById('net-status').innerText = "מחובר למארח בהצלחה!";
                startGame('ONLINE_CLIENT');
            });
        }

        function setupConnection() {
            conn.on('data', data => {
                if (data.type === 'keys' && gameMode === 'ONLINE_HOST') {
                    networkKeys = data.keys;
                }
                if (data.type === 'state' && gameMode === 'ONLINE_CLIENT') {
                    ball.x = data.b.x; ball.y = data.b.y;
                    p1.x = data.p1.x; p1.y = data.p1.y;
                    p2.x = data.p2.x; p2.y = data.p2.y;
                    score1 = data.s1; score2 = data.s2;
                    
                    document.getElementById('score1').innerText = score1;
                    document.getElementById('score2').innerText = score2;

                    // הוספת נקודות לשובל התנועה גם אצל הלקוח
                    ballTrail.push({x: ball.x, y: ball.y});
                    if(ballTrail.length > 15) ballTrail.shift();
                }
                if (data.type === 'event' && gameMode === 'ONLINE_CLIENT') {
                    if (data.event === 'sparks') createSparks(data.x, data.y, data.color);
                    if (data.event === 'goal') { playSound('goal'); createGoalExplosion(); showGoalMessage(); }
                    if (data.event === 'hit') playSound('hit');
                }
            });
        }

        // --- אתחול ואירועי חלון ---
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (gameState === 'START') {
                resetPositions();
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => { localKeys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { localKeys[e.key.toLowerCase()] = false; });

        function resetPositions() {
            ball.x = width / 2; ball.y = height / 2;
            ball.vx = 0; ball.vy = 0;
            
            p1.x = width * 0.75; p1.y = height / 2;
            p1.vx = 0; p1.vy = 0;
            
            p2.x = width * 0.25; p2.y = height / 2;
            p2.vx = 0; p2.vy = 0;
            
            ballTrail = [];
        }

        function showStartScreen() {
            gameState = 'START';
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            if (conn) { conn.close(); conn = null; }
            if (!peer) initPeer();
        }

        function startGame(mode) {
            gameMode = mode;
            score1 = 0; score2 = 0;
            document.getElementById('score1').innerText = score1;
            document.getElementById('score2').innerText = score2;
            document.getElementById('start-screen').classList.add('hidden');
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            resetPositions();
            confetti = []; particles = [];
            gameState = 'PLAYING';
        }

        // --- לוגיקת משחק ופיזיקה ---
        function resolveCollision(obj1, obj2) {
            const dx = obj2.x - obj1.x;
            const dy = obj2.y - obj1.y;
            const distance = Math.sqrt(dx*dx + dy*dy);
            const minDist = obj1.radius + obj2.radius;

            if (distance < minDist) {
                const overlap = (minDist - distance) / 2;
                const nx = dx / distance;
                const ny = dy / distance;

                obj1.x -= nx * overlap; obj1.y -= ny * overlap;
                obj2.x += nx * overlap; obj2.y += ny * overlap;

                const kx = obj1.vx - obj2.vx;
                const ky = obj1.vy - obj2.vy;
                const p = 2 * (nx * kx + ny * ky) / (obj1.mass + obj2.mass);

                obj1.vx -= p * obj2.mass * nx * 0.9;
                obj1.vy -= p * obj2.mass * ny * 0.9;
                obj2.vx += p * obj1.mass * nx * 0.9;
                obj2.vy += p * obj1.mass * ny * 0.9;

                if (Math.abs(p) > 2.5) {
                    createSparks(obj1.x + nx * obj1.radius, obj1.y + ny * obj1.radius, '#f1c40f');
                    playSound('hit');
                    if (gameMode === 'ONLINE_HOST' && conn) {
                        conn.send({ type: 'event', event: 'sparks', x: obj1.x + nx * obj1.radius, y: obj1.y + ny * obj1.radius, color: '#f1c40f' });
                        conn.send({ type: 'event', event: 'hit' });
                    }
                }
            }
        }

        function updatePhysics() {
            if (gameState === 'GOAL' || gameState === 'OVER') {
                p1.vx *= 0.9; p1.vy *= 0.9; p2.vx *= 0.9; p2.vy *= 0.9; ball.vx *= 0.95; ball.vy *= 0.95;
            } else {
                p1.vx *= 0.93; p1.vy *= 0.93; p2.vx *= 0.93; p2.vy *= 0.93; ball.vx *= 0.985; ball.vy *= 0.985;
            }

            p1.x += p1.vx; p1.y += p1.vy;
            p2.x += p2.vx; p2.y += p2.vy;
            ball.x += ball.vx; ball.y += ball.vy;

            ballTrail.push({x: ball.x, y: ball.y});
            if(ballTrail.length > 15) ballTrail.shift();

            resolveCollision(p1, ball); 
            resolveCollision(p2, ball); 
            resolveCollision(p1, p2);

            // חוק קו האמצע
            if (p1.x - p1.radius < width / 2) { p1.x = width / 2 + p1.radius; p1.vx *= -0.5; }
            if (p2.x + p2.radius > width / 2) { p2.x = width / 2 - p2.radius; p2.vx *= -0.5; }

            const goalTop = height / 2 - 120;
            const goalBottom = height / 2 + 120;

            const checkWallCollision = (obj, isBall) => {
                let hitWall = false;
                if (obj.y - obj.radius < 0) { obj.y = obj.radius; obj.vy *= -obj.bounce || -0.5; hitWall = true; }
                if (obj.y + obj.radius > height) { obj.y = height - obj.radius; obj.vy *= -obj.bounce || -0.5; hitWall = true; }

                const inGoalY = obj.y > goalTop && obj.y < goalBottom;
                
                if (obj.x - obj.radius < 0) {
                    if (isBall && inGoalY && gameState === 'PLAYING') { scoreGoal(1); } 
                    else { obj.x = obj.radius; obj.vx *= -obj.bounce || -0.5; hitWall = true; }
                }
                if (obj.x + obj.radius > width) {
                    if (isBall && inGoalY && gameState === 'PLAYING') { scoreGoal(2); } 
                    else { obj.x = width - obj.radius; obj.vx *= -obj.bounce || -0.5; hitWall = true; }
                }

                if(hitWall && isBall && Math.abs(obj.vx) + Math.abs(obj.vy) > 5) {
                    createSparks(obj.x, obj.y, '#ffffff');
                    playSound('hit');
                    if (gameMode === 'ONLINE_HOST' && conn) {
                        conn.send({ type: 'event', event: 'sparks', x: obj.x, y: obj.y, color: '#ffffff' });
                        conn.send({ type: 'event', event: 'hit' });
                    }
                }
            };

            checkWallCollision(p1, false); checkWallCollision(p2, false); checkWallCollision(ball, true);
        }

        function showGoalMessage() {
            const msg = document.getElementById('goal-message');
            msg.classList.add('show-goal');
            setTimeout(() => { msg.classList.remove('show-goal'); }, 2500);
        }

        function scoreGoal(playerNum) {
            gameState = 'GOAL';
            playSound('goal');
            createGoalExplosion();
            showGoalMessage();

            if (gameMode === 'ONLINE_HOST' && conn) {
                conn.send({ type: 'event', event: 'goal' });
            }

            if (playerNum === 1) { score1++; document.getElementById('score1').innerText = score1; } 
            else { score2++; document.getElementById('score2').innerText = score2; }

            // סיום משחק ב-5 נקודות למשל
            if (score1 >= 5 || score2 >= 5) {
                setTimeout(endGame, 2500);
            } else {
                setTimeout(() => { resetPositions(); gameState = 'PLAYING'; }, 2500);
            }
        }

        function endGame() {
            gameState = 'OVER';
            const screen = document.getElementById('game-over-screen');
            const winnerText = document.getElementById('winner-text');
            
            if (score1 > score2) winnerText.innerHTML = '<span style="color:#00d2ff;">שחקן 1</span> אלוף העולם!';
            else if (score2 > score1) winnerText.innerHTML = '<span style="color:#ff3366;">שחקן 2</span> אלוף העולם!';
            
            screen.classList.remove('hidden');
            setTimeout(showStartScreen, 4000);
        }

        // --- ציור המגרש תלת-ממד (Canvas) ---
        function drawField() {
            let bgGrad = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width);
            bgGrad.addColorStop(0, '#112b1d'); 
            bgGrad.addColorStop(1, '#08140e'); 
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            ctx.shadowColor = 'rgba(255, 255, 255, 0.4)'; ctx.shadowBlur = 15;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 4;

            ctx.beginPath(); ctx.moveTo(width/2, 0); ctx.lineTo(width/2, height); ctx.stroke();
            ctx.beginPath(); ctx.arc(width/2, height/2, 90, 0, Math.PI*2); ctx.stroke();
            
            ctx.shadowBlur = 20; ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(width/2, height/2, 6, 0, Math.PI*2); ctx.fill();

            const goalTop = height / 2 - 120;
            const goalHeight = 240;

            ctx.shadowBlur = 0; 
            
            ctx.strokeStyle = '#ff3366'; ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 10;
            ctx.strokeRect(-10, goalTop - 60, 180, goalHeight + 120);
            ctx.fillStyle = 'rgba(255, 51, 102, 0.1)'; ctx.fillRect(0, goalTop, 40, goalHeight);

            ctx.strokeStyle = '#00d2ff'; ctx.shadowColor = '#00d2ff'; ctx.shadowBlur = 10;
            ctx.strokeRect(width - 170, goalTop - 60, 180, goalHeight + 120);
            ctx.fillStyle = 'rgba(0, 210, 255, 0.1)'; ctx.fillRect(width - 40, goalTop, 40, goalHeight);
            
            ctx.shadowBlur = 0; 
        }

        function draw3DObject(obj, isBall = false) {
            ctx.shadowColor = 'rgba(0, 0, 0, 0.6)'; ctx.shadowBlur = 15; ctx.shadowOffsetX = 10; ctx.shadowOffsetY = 10;
            ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#000'; ctx.fill(); 
            
            ctx.shadowColor = 'transparent'; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

            let grad = ctx.createRadialGradient(obj.x - obj.radius/3, obj.y - obj.radius/3, obj.radius/10, obj.x, obj.y, obj.radius);
            grad.addColorStop(0, obj.colorLight); grad.addColorStop(0.8, obj.colorBase); grad.addColorStop(1, '#000000');

            ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            ctx.fillStyle = grad; ctx.fill();

            if (!isBall) {
                ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius - 8, 0, Math.PI * 2);
                ctx.lineWidth = 3; ctx.strokeStyle = obj.colorLight;
                ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1.0;
            } else {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius * 0.35, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(obj.x - 7, obj.y - 7, obj.radius * 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(obj.x + 7, obj.y - 7, obj.radius * 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(obj.x, obj.y + 10, obj.radius * 0.2, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(obj.x - obj.radius/3, obj.y - obj.radius/3, obj.radius/4, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
            }
        }

        function drawTrail() {
            if(ballTrail.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(ballTrail[0].x, ballTrail[0].y);
            for(let i=1; i<ballTrail.length; i++) ctx.lineTo(ballTrail[i].x, ballTrail[i].y);
            ctx.lineTo(ball.x, ball.y);
            
            let gradient = ctx.createLinearGradient(ballTrail[0].x, ballTrail[0].y, ball.x, ball.y);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0.4)');
            
            ctx.strokeStyle = gradient; ctx.lineWidth = ball.radius;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
        }

        // --- לולאת המשחק ---
        function gameLoop(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const dt = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            if (gameState === 'PLAYING') {
                if (gameMode === 'ONLINE_CLIENT') {
                    // לקוח רק שולח פקודות מקלדת
                    let myInput = { up: localKeys['arrowup'], down: localKeys['arrowdown'], left: localKeys['arrowleft'], right: localKeys['arrowright'] };
                    if (conn) conn.send({ type: 'keys', keys: myInput });
                } else {
                    // המארח או מחשב מקומי מנהל פיזיקה
                    let p1In = { up: localKeys['arrowup'], down: localKeys['arrowdown'], left: localKeys['arrowleft'], right: localKeys['arrowright'] };
                    let p2In = gameMode === 'ONLINE_HOST' ? networkKeys : { up: localKeys['w']||localKeys['׳'], down: localKeys['s']||localKeys['ד'], left: localKeys['a']||localKeys['ש'], right: localKeys['d']||localKeys['ג'] };

                    if(p1In.up) p1.vy -= p1.speed; if(p1In.down) p1.vy += p1.speed;
                    if(p1In.left) p1.vx -= p1.speed; if(p1In.right) p1.vx += p1.speed;

                    if(p2In.up) p2.vy -= p2.speed; if(p2In.down) p2.vy += p2.speed;
                    if(p2In.left) p2.vx -= p2.speed; if(p2In.right) p2.vx += p2.speed;

                    [p1, p2].forEach(obj => {
                        const s = Math.sqrt(obj.vx*obj.vx + obj.vy*obj.vy);
                        if (s > obj.maxSpeed) { obj.vx = (obj.vx/s)*obj.maxSpeed; obj.vy = (obj.vy/s)*obj.maxSpeed; }
                    });

                    updatePhysics();

                    // סנכרון מצב ללקוח
                    if (gameMode === 'ONLINE_HOST' && conn) {
                        conn.send({ type: 'state', b: {x: ball.x, y: ball.y}, p1: {x: p1.x, y: p1.y}, p2: {x: p2.x, y: p2.y}, s1: score1, s2: score2 });
                    }
                }
            }

            // רינדור ויזואלי לכולם
            ctx.clearRect(0, 0, width, height);
            drawField();
            drawTrail();
            draw3DObject(p1);
            draw3DObject(p2);
            draw3DObject(ball, true);

            // חלקיקים
            for(let i = particles.length-1; i>=0; i--) {
                particles[i].update(); particles[i].draw();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
            for(let i = confetti.length-1; i>=0; i--) {
                confetti[i].update(); confetti[i].draw();
                if(confetti[i].y > height + 20) confetti.splice(i, 1);
            }

            requestAnimationFrame(gameLoop);
        }

        // הפעלה ראשונית
        resize();
        initPeer();
        requestAnimationFrame(gameLoop);

    </script>
</body>
