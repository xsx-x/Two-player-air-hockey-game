<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוחמי המקל - Multiplayer Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

        body {
            margin: 0; overflow: hidden; background-color: #0d1317;
            font-family: 'Heebo', sans-serif; color: white; touch-action: none;
        }

        .nav-buttons { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; z-index: 200; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; text-decoration: none; font-size: 14px;
            font-weight: bold; transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); transform: scale(1.05); }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; z-index: 10;
        }

        #top-bar { display: flex; justify-content: space-between; padding: 20px 50px; margin-top: 20px; }

        .player-hud { width: 42%; }
        .health-container {
            height: 25px; background: rgba(0,0,0,0.6); border: 2px solid #333;
            border-radius: 5px; position: relative; overflow: hidden;
        }
        .health-ghost {
            position: absolute; top: 0; right: 0; height: 100%; background: #e74c3c;
            width: 100%; transition: width 0.6s cubic-bezier(0, 0, 0, 1);
        }
        .health-bar {
            position: absolute; top: 0; right: 0; height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60); width: 100%;
            transition: width 0.2s ease-out; z-index: 2;
        }
        .p2-hud .health-bar, .p2-hud .health-ghost { right: auto; left: 0; }
        
        .energy-container {
            height: 8px; background: rgba(0,0,0,0.5); margin-top: 5px;
            border-radius: 4px; overflow: hidden; width: 60%;
        }
        .energy-bar {
            height: 100%; background: #f1c40f; width: 0%;
            box-shadow: 0 0 10px #f1c40f; transition: width 0.3s;
        }
        .p2-hud .energy-bar { float: left; }

        .player-name { font-size: 20px; font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; }
        .p1-color { color: #00d2ff; } .p2-color { color: #ff3366; }

        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 20, 0.9); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 40px; text-align: center; max-width: 650px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .control-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; text-align: right; border: 1px solid rgba(255,255,255,0.05); }
        kbd { background: #444; color: #f1c40f; padding: 2px 8px; border-radius: 4px; font-size: 13px; margin: 0 2px; }

        .network-panel {
            background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; width: 100%; box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            color: #000; font-size: 22px; font-weight: 900; padding: 15px 45px;
            border: none; border-radius: 40px; cursor: pointer; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(241, 196, 15, 0.3); }

        #ko-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 180px; font-weight: 900; font-style: italic; color: #fff;
            text-shadow: 0 0 30px #f1c40f; pointer-events: none; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }
        .show-ko { transform: translate(-50%, -50%) scale(1) !important; }

        canvas { display: block; }
        .hidden { display: none !important; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="nav-buttons">
        <a href="index.html" class="nav-btn">🏠 דף הבית</a>
        <button onclick="location.reload()" class="nav-btn">🔄 איפוס משחק</button>
    </div>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="player-hud p1-hud">
                <div class="player-name p1-color">MASTER BLUE</div>
                <div class="health-container">
                    <div id="hp-ghost1" class="health-ghost"></div>
                    <div id="hp1" class="health-bar"></div>
                </div>
                <div class="energy-container"><div id="en1" class="energy-bar"></div></div>
            </div>
            <div class="player-hud p2-hud">
                <div class="player-name p2-color" style="text-align: left;">RED DRAGON</div>
                <div class="health-container">
                    <div id="hp-ghost2" class="health-ghost"></div>
                    <div id="hp2" class="health-bar"></div>
                </div>
                <div class="energy-container"><div id="en2" class="energy-bar"></div></div>
            </div>
        </div>
        <div id="ko-message">K.O.</div>
    </div>

    <div id="start-screen" class="overlay-screen">
        <div class="glass-panel">
            <h1 style="font-size: 54px; margin: 0; color: #f1c40f; text-shadow: 0 10px 20px rgba(0,0,0,0.5);">STICK FIGHTERS</h1>
            
            <div class="controls-grid">
                <div class="control-box">
                    <h3 class="p1-color" style="margin-top:0;">שחקן 1 (כחול)</h3>
                    <p>תנועה: <kbd>W</kbd><kbd>A</kbd><kbd>D</kbd></p>
                    <p>אגרוף: <kbd>F</kbd> | בעיטה: <kbd>G</kbd></p>
                    <p style="color: #f1c40f;">מיוחד: <kbd>R</kbd></p>
                </div>
                <div class="control-box">
                    <h3 class="p2-color" style="margin-top:0;">שחקן 2 (אדום)</h3>
                    <p>תנועה: <kbd>↑</kbd><kbd>←</kbd><kbd>→</kbd></p>
                    <p>אגרוף: <kbd>K</kbd> | בעיטה: <kbd>L</kbd></p>
                    <p style="color: #f1c40f;">מיוחד: <kbd>O</kbd></p>
                </div>
            </div>

            <button class="btn" onclick="startGame('LOCAL')">משחק מקומי (1 נגד 1)</button>
            
            <div class="network-panel">
                <h3 style="margin-top:0; color: #fff;">משחק רשת - שחק נגד חבר מרחוק</h3>
                <p>הקוד שלך (מארח): <strong id="my-id" style="color: #00d2ff; letter-spacing: 1px;">מתחבר לשרת...</strong></p>
                <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                <input type="text" id="friend-id" placeholder="הדבק כאן קוד של חבר כדי להצטרף">
                <br><br>
                <button class="btn" style="padding: 10px 25px; font-size: 18px;" onclick="joinNetworkGame()">הצטרף לחדר</button>
                <p id="net-status" style="color: #f1c40f; font-weight: bold; margin-bottom: 0; margin-top: 10px;"></p>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, groundY;
        let gameState = 'START';
        let gameMode = 'LOCAL'; // LOCAL, ONLINE_HOST, ONLINE_CLIENT

        // סאונד סינתטי
        const audio = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type, dur, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + dur);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
        };

        class Fighter {
            constructor(x, color, isP1) {
                this.x = x; this.y = 0; this.vx = 0; this.vy = 0;
                this.color = color; this.isP1 = isP1;
                this.hp = 100; this.energy = 0;
                this.state = 'idle'; 
                this.dir = isP1 ? 1 : -1;
                this.timer = 0; this.hitStop = 0;
                this.anim = 0;
                this.accessory = [{x:0, y:0}, {x:0, y:0}, {x:0, y:0}];
            }

            reset(x, dir) {
                this.x = x; this.y = groundY; this.vx = 0; this.vy = 0;
                this.hp = 100; this.energy = 0; this.state = 'idle'; this.dir = dir;
                this.timer = 0; this.hitStop = 0;
            }

            update(keys, opp) {
                if (this.hp <= 0) { this.state = 'dead'; return; }
                if (this.hitStop > 0) { this.hitStop--; return; }

                this.anim += 0.15;
                if (this.timer > 0) this.timer--;
                else this.state = (Math.abs(this.vx) > 1) ? 'walk' : 'idle';

                // תנועה
                if (this.timer === 0) {
                    if (keys.left) { this.vx = -6; this.dir = -1; }
                    else if (keys.right) { this.vx = 6; this.dir = 1; }
                    else { this.vx *= 0.8; }

                    if (keys.jump && this.y >= groundY) { 
                        this.vy = -16; 
                        audio.play(150, 'square', 0.2);
                    }
                    
                    if (keys.punch) this.attack('punch', 10, 40, 15);
                    if (keys.kick) this.attack('kick', 15, 60, 20);
                    if (keys.special && this.energy >= 100) this.attack('special', 35, 120, 40);
                }

                this.vy += 0.8; 
                this.x += this.vx; this.y += this.vy;

                if (this.y > groundY) { this.y = groundY; this.vy = 0; }
                this.x = Math.max(50, Math.min(width - 50, this.x));

                // עדכון אביזר (גלימה/בנדנה)
                let anchorX = this.x - this.dir * 5;
                let anchorY = this.y - 75;
                this.accessory[0].x = anchorX; this.accessory[0].y = anchorY;
                for(let i=1; i<this.accessory.length; i++) {
                    let seg = this.accessory[i];
                    let prev = this.accessory[i-1];
                    let dx = seg.x - prev.x; let dy = seg.y - prev.y;
                    let angle = Math.atan2(dy, dx);
                    seg.x = prev.x + Math.cos(angle) * 12;
                    seg.y = prev.y + Math.sin(angle) * 12 + 2; 
                }
            }

            attack(type, dmg, range, time) {
                this.state = type; this.timer = time;
                if (type === 'special') {
                    this.energy = 0; this.vx = this.dir * 15;
                    audio.play(600, 'sawtooth', 0.5);
                    updateUI();
                } else {
                    audio.play(type === 'punch' ? 400 : 300, 'triangle', 0.1);
                }

                let target = (this.isP1) ? p2 : p1;
                let dx = Math.abs(this.x + this.dir * range - target.x);
                let dy = Math.abs(this.y - 40 - (target.y - 40));

                if (dx < 50 && dy < 80 && target.hp > 0) {
                    target.takeHit(dmg, this.dir * (type === 'special' ? 20 : 8));
                    this.energy = Math.min(100, this.energy + 15);
                    updateUI();
                }
            }

            takeHit(dmg, push) {
                this.hp -= dmg; this.vx = push; this.vy = -5;
                this.state = 'hit'; this.timer = 15; this.hitStop = 5;
                shake = 10;
                createParticles(this.x, this.y - 50, this.color);
                audio.play(100, 'sawtooth', 0.2, 0.2);
                updateUI();
                if (this.hp <= 0) {
                    this.hp = 0;
                    gameState = 'OVER';
                    document.getElementById('ko-message').classList.add('show-ko');
                    setTimeout(() => showStartScreen(), 4000);
                }
            }

            draw() {
                ctx.save();
                ctx.strokeStyle = this.state === 'hit' ? '#fff' : this.color;
                ctx.lineWidth = 6; ctx.lineCap = 'round';
                
                // השתקפות צל קטנה
                ctx.globalAlpha = 0.1;
                this.drawStickman(this.x, this.y + 20, this.dir, -0.5);
                ctx.globalAlpha = 1;

                this.drawStickman(this.x, this.y, this.dir, 1);
                
                // ציור האביזר הפיזיקלי
                ctx.beginPath(); 
                ctx.strokeStyle = (this.isP1) ? '#00d2ff' : '#ff3366'; 
                ctx.lineWidth = 4;
                ctx.moveTo(this.accessory[0].x, this.accessory[0].y);
                for(let i=1; i<this.accessory.length; i++) ctx.lineTo(this.accessory[i].x, this.accessory[i].y);
                ctx.stroke();

                ctx.restore();
            }

            drawStickman(x, y, d, s) {
                ctx.save(); ctx.translate(x, y); ctx.scale(d, s);
                let t = this.anim;
                let bodyY = -50;
                
                // Legs
                let l1 = (this.state === 'walk') ? Math.sin(t*2) * 20 : (this.state === 'jump') ? 20 : 10;
                let l2 = (this.state === 'walk') ? Math.cos(t*2) * 20 : (this.state === 'jump') ? -20 : -10;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(l1, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(l2, 0); ctx.stroke();

                // Spine
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, bodyY); ctx.stroke();

                // Arms
                let a1 = 20, a2 = 20;
                if (this.state === 'punch') a1 = 50;
                if (this.state === 'kick') { a1 = -20; l1 = 60; }
                if (this.state === 'special') { a1 = 60; a2 = 60; }
                
                ctx.beginPath(); ctx.moveTo(0, bodyY + 10); ctx.lineTo(a1, bodyY + 10 + Math.sin(t)*5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, bodyY + 10); ctx.lineTo(-a2, bodyY + 15); ctx.stroke();

                // Head
                ctx.beginPath(); ctx.arc(0, bodyY - 15, 12, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }
        }

        let p1 = new Fighter(200, '#00d2ff', true);
        let p2 = new Fighter(600, '#ff3366', false);
        let particles = [], shake = 0;

        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                    life: 1, color: Math.random() > 0.5 ? '#fff' : color
                });
            }
        }

        function updateUI() {
            document.getElementById('hp1').style.width = p1.hp + '%';
            document.getElementById('hp-ghost1').style.width = p1.hp + '%';
            document.getElementById('hp2').style.width = p2.hp + '%';
            document.getElementById('hp-ghost2').style.width = p2.hp + '%';
            document.getElementById('en1').style.width = p1.energy + '%';
            document.getElementById('en2').style.width = p2.energy + '%';
        }

        // --- Networking Logic (PeerJS) ---
        let peer = null;
        let conn = null;
        let networkKeys = { left: false, right: false, jump: false, punch: false, kick: false, special: false };

        function initPeer() {
            peer = new Peer();
            peer.on('open', id => { document.getElementById('my-id').innerText = id; });
            peer.on('connection', c => {
                conn = c; setupConnection();
                gameMode = 'ONLINE_HOST';
                document.getElementById('net-status').innerText = "שחקן התחבר! המשחק מתחיל...";
                setTimeout(() => startGame('ONLINE_HOST'), 1000);
            });
        }

        function joinNetworkGame() {
            const friendId = document.getElementById('friend-id').value.trim();
            if (!friendId) return;
            document.getElementById('net-status').innerText = "מתחבר...";
            conn = peer.connect(friendId);
            conn.on('open', () => {
                setupConnection();
                gameMode = 'ONLINE_CLIENT';
                document.getElementById('net-status').innerText = "מחובר למארח!";
                startGame('ONLINE_CLIENT');
            });
        }

        function setupConnection() {
            conn.on('data', data => {
                if (data.type === 'keys' && gameMode === 'ONLINE_HOST') {
                    networkKeys = data.keys;
                }
                if (data.type === 'state' && gameMode === 'ONLINE_CLIENT') {
                    // עדכון מצב מפורט מהמארח
                    p1.x = data.p1.x; p1.y = data.p1.y; p1.state = data.p1.s; p1.dir = data.p1.d; p1.anim = data.p1.a;
                    p2.x = data.p2.x; p2.y = data.p2.y; p2.state = data.p2.s; p2.dir = data.p2.d; p2.anim = data.p2.a;
                    p1.hp = data.hp1; p2.hp = data.hp2;
                    p1.energy = data.en1; p2.energy = data.en2;
                    updateUI();
                    
                    if (data.hit) {
                        createParticles(data.hit.x, data.hit.y, data.hit.color);
                        shake = 10;
                        audio.play(100, 'sawtooth', 0.2);
                    }
                    if (data.ko) {
                        gameState = 'OVER';
                        document.getElementById('ko-message').classList.add('show-ko');
                    }
                }
            });
        }

        // --- Game Engine ---
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            groundY = height - 150;
            p1.reset(width * 0.2, 1);
            p2.reset(width * 0.8, -1);
        }

        window.addEventListener('resize', resize);
        
        const keys = {};
        window.onkeydown = (e) => { 
            keys[e.key.toLowerCase()] = true; 
            audio.init(); 
        };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function showStartScreen() {
            gameState = 'START';
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('ko-message').classList.remove('show-ko');
        }

        function startGame(mode) {
            gameMode = mode;
            document.getElementById('start-screen').classList.add('hidden');
            resize();
            updateUI();
            gameState = 'PLAYING';
        }

        function drawScene() {
            let grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#0d1317'); grad.addColorStop(1, '#1a252c');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#141e24';
            for(let i=0; i<3; i++) {
                ctx.beginPath(); ctx.moveTo(0, height);
                for(let x=0; x<=width; x+=100) ctx.lineTo(x, height - 150 - Math.sin(x*0.005 + i)*80);
                ctx.lineTo(width, height); ctx.fill();
            }

            ctx.fillStyle = '#0a0f12'; ctx.fillRect(0, groundY, width, height - groundY);
            ctx.strokeStyle = '#1e2933'; ctx.lineWidth = 2;
            for(let i=0; i<width; i+=100) { ctx.beginPath(); ctx.moveTo(i, groundY); ctx.lineTo(i - 100, height); ctx.stroke(); }
        }

        function gameLoop() {
            ctx.clearRect(0,0,width,height);
            
            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                shake *= 0.9;
            }

            drawScene();

            if (gameState === 'PLAYING') {
                if (gameMode === 'ONLINE_CLIENT') {
                    // הלקוח רק שולח פקודות למארח
                    let myInput = {
                        left: keys['arrowleft'], right: keys['arrowright'], jump: keys['arrowup'],
                        punch: keys['k']||keys['ל'], kick: keys['l']||keys['ך'], special: keys['o']||keys['ם']
                    };
                    if (conn) conn.send({ type: 'keys', keys: myInput });
                } else {
                    // המארח מחשב פיזיקה עבור שני השחקנים
                    let p1In = {
                        left: keys['a']||keys['ש'], right: keys['d']||keys['ג'], jump: keys['w']||keys['׳'],
                        punch: keys['f']||keys['כ'], kick: keys['g']||keys['ע'], special: keys['r']||keys['ר']
                    };
                    
                    let p2In = (gameMode === 'ONLINE_HOST') ? networkKeys : {
                        left: keys['arrowleft'], right: keys['arrowright'], jump: keys['arrowup'],
                        punch: keys['k']||keys['ל'], kick: keys['l']||keys['ך'], special: keys['o']||keys['ם']
                    };

                    let oldHp1 = p1.hp, oldHp2 = p2.hp;
                    p1.update(p1In, p2);
                    p2.update(p2In, p1);

                    // סנכרון מצב ללקוח
                    if (gameMode === 'ONLINE_HOST' && conn) {
                        let hitData = null;
                        if (p1.hp < oldHp1) hitData = { x: p1.x, y: p1.y - 50, color: p1.color };
                        if (p2.hp < oldHp2) hitData = { x: p2.x, y: p2.y - 50, color: p2.color };

                        conn.send({
                            type: 'state',
                            p1: {x: p1.x, y: p1.y, s: p1.state, d: p1.dir, a: p1.anim},
                            p2: {x: p2.x, y: p2.y, s: p2.state, d: p2.dir, a: p2.anim},
                            hp1: p1.hp, hp2: p2.hp,
                            en1: p1.energy, en2: p2.energy,
                            hit: hitData,
                            ko: p1.hp <= 0 || p2.hp <= 0
                        });
                    }
                }
            }

            p1.draw();
            p2.draw();

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        // Init
        initPeer();
        resize();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
